<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prêmio Chefe - Rifa Online</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

</head>

<body>

<header id="header">
    <div class="header-content">
        <img src="imgs/logo.png" id="logo">
    </div>
</header>

<img src="imgs/banner.png" class="banner">

<div class="progresso">
    <div class="barra" id="barra"></div>
</div>
<p id="contador"></p>

<h1>🎟 Escolha seu número</h1>

<div id="grid" class="grid"></div>

<div id="modal" class="modal">

<div class="box">

<h3 id="numero"></h3>

<input id="nome" placeholder="Seu nome">

<input id="telefone" placeholder="Telefone">

<button onclick="reservar()">Reservar</button>

<button onclick="fechar()">Cancelar</button>

</div>

</div>

<script src="firebase.js"></script>
<script src="script.js"></script>

<footer class="rodape">
    <p>
        <b>Rifas Prêmio Chefe</b><br>
        &copy; Todos os direitos reservados 2026<br><br>
        <b>Desenvolvido por:</b> Grupo Mega Rifas
    </p>
</footer>

</body>
</html>
